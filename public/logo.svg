<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAFAF9"/>
  
  <!-- Outer frame -->
  <rect x="50" y="50" width="300" height="300" rx="6" stroke="#1A1A1A" stroke-width="3" fill="none"/>
  
  <!-- Inner frame -->
  <rect x="86" y="86" width="228" height="228" rx="4" stroke="#57534E" stroke-width="1.5" fill="none"/>
  
  <!-- Z abstraction - top line -->
  <line x1="140" y1="140" x2="260" y2="140" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Z abstraction - diagonal -->
  <line x1="260" y1="140" x2="140" y2="260" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Z abstraction - bottom line -->
  <line x1="140" y1="260" x2="260" y2="260" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="3" fill="#1A1A1A"/>
  <circle cx="200" cy="140" r="2" fill="#737373"/>
  <circle cx="200" cy="260" r="2" fill="#737373"/>
</svg>
