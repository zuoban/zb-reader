<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ZB Reader Logo</title>
  <desc id="desc">A skeuomorphic open book icon inspired by classic reading app icons, with zb reader text on the left page.</desc>

  <defs>
    <linearGradient id="cover" x1="72" y1="136" x2="328" y2="305" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4C4D4A"/>
      <stop offset="0.45" stop-color="#171817"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="paperLeft" x1="78" y1="103" x2="203" y2="289" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF5"/>
      <stop offset="0.62" stop-color="#F5F1E4"/>
      <stop offset="1" stop-color="#DCD2B9"/>
    </linearGradient>
    <linearGradient id="paperRight" x1="205" y1="101" x2="325" y2="290" gradientUnits="userSpaceOnUse">
